<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圖片熱點預測器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>圖片熱點預測器</h1>
        <p>提案模式：支援圖片預測與網址 DOM 融合預測。</p>
      </div>
      <div class="actions">
        <button id="predict-btn">生成預測</button>
        <button id="download-btn" class="ghost">下載 PNG</button>
        <button id="export-pdf-btn" class="ghost">匯出提案 PDF</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>輸入來源</h2>
        <div class="stack">
          <label class="label" for="image-file">1) 上傳或貼上截圖</label>
          <div class="row">
            <input id="image-file" type="file" accept="image/*" />
            <button id="paste-btn" class="ghost">貼上截圖 (Ctrl+V)</button>
          </div>

          <label class="label" for="image-url">2) 圖片網址</label>
          <div class="row">
            <input id="image-url" type="url" placeholder="https://example.com/sample.png" />
            <button id="load-image-url-btn">載入圖片網址</button>
          </div>

          <label class="label" for="page-url">3) 網頁網址（DOM 融合）</label>
          <div class="row">
            <input id="page-url" type="url" placeholder="https://your-landing-page.com" />
            <button id="load-page-url-btn">載入網址並抓截圖</button>
            <button id="dom-only-btn" class="ghost">只抓 DOM 訊號</button>
          </div>
          <p class="hint">
            若頁面有 GDPR 同意框：請先手動截圖（截圖前關掉彈窗），用上方「上傳圖片」貼入，再按「只抓 DOM 訊號」輸入同一網址，最後按「生成預測」。
          </p>
        </div>
      </section>

      <section class="card">
        <h2>預測參數</h2>
        <div class="stack">
          <label class="label" for="hotspot-count">熱點數量</label>
          <input id="hotspot-count" type="range" min="8" max="48" value="24" />
          <div id="hotspot-count-label" class="hint">24 個熱點</div>

          <label class="label" for="heat-radius">熱點半徑</label>
          <input id="heat-radius" type="range" min="28" max="160" value="84" />
          <div id="heat-radius-label" class="hint">84px 半徑</div>

          <label class="label" for="center-bias">中心偏好（圖片）</label>
          <input id="center-bias" type="range" min="0" max="100" value="56" />
          <div id="center-bias-label" class="hint">56%</div>

          <label class="label" for="dom-weight">DOM 權重（融合）</label>
          <input id="dom-weight" type="range" min="0" max="100" value="70" />
          <div id="dom-weight-label" class="hint">70%</div>
        </div>
      </section>

      <section class="card wide">
        <h2>輸出結果</h2>
        <p class="hint">橘色越深表示預測注意力越高。DOM 融合時會優先點亮可點擊元素區。</p>
        <div class="canvas-wrap">
          <canvas id="preview-canvas"></canvas>
        </div>
        <pre id="output-json" class="api-output"></pre>
      </section>
    </main>

    <footer class="footer">
      <span>不需 GA。建議網址分析使用 Vercel 部署版，以啟用後端 DOM 抓取。</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
