<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圖片熱點預測器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>圖片熱點預測器</h1>
        <p>提案模式：上傳圖片或貼網址，快速生成熱點圖與提案報告。</p>
      </div>
      <div class="actions">
        <button id="predict-btn">生成預測</button>
        <button id="download-btn" class="ghost">下載 PNG</button>
        <button id="export-pdf-btn" class="ghost">匯出提案 PDF</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>輸入來源</h2>
        <div class="stack">
          <label class="label" for="image-file">1) 上傳圖片</label>
          <input id="image-file" type="file" accept="image/*" />

          <label class="label" for="image-url">2) 圖片網址</label>
          <div class="row">
            <input id="image-url" type="url" placeholder="https://example.com/sample.png" />
            <button id="load-image-url-btn">載入圖片網址</button>
          </div>

          <label class="label" for="page-url">3) 網頁網址（縮圖擷取）</label>
          <div class="row">
            <input id="page-url" type="url" placeholder="https://your-landing-page.com" />
            <button id="load-page-url-btn">載入網頁網址</button>
          </div>
          <p class="hint">也可直接從剪貼簿貼上圖片（Ctrl+V）。</p>
        </div>
      </section>

      <section class="card">
        <h2>預測參數</h2>
        <div class="stack">
          <label class="label" for="hotspot-count">熱點數量</label>
          <input id="hotspot-count" type="range" min="3" max="18" value="8" />
          <div id="hotspot-count-label" class="hint">8 個熱點</div>

          <label class="label" for="heat-radius">熱點半徑</label>
          <input id="heat-radius" type="range" min="20" max="120" value="56" />
          <div id="heat-radius-label" class="hint">56px 半徑</div>

          <label class="label" for="center-bias">中心偏好</label>
          <input id="center-bias" type="range" min="0" max="100" value="48" />
          <div id="center-bias-label" class="hint">48% 中心偏好</div>
        </div>
      </section>

      <section class="card wide">
        <h2>輸出結果</h2>
        <p class="hint">橘色越深代表預測注意力越高。</p>
        <div class="canvas-wrap">
          <canvas id="preview-canvas"></canvas>
        </div>
        <pre id="output-json" class="api-output"></pre>
      </section>
    </main>

    <footer class="footer">
      <span>不需 GA 資料，可直接部署在 GitHub Pages 與 Vercel。</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
